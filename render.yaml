# Render Blueprint: один файл для деплоя веб-сервиса и БД.
# Документация: https://render.com/docs/blueprint-spec

databases:
  - name: devlearn-db
    databaseName: devlearn
    user: devlearn
    plan: free

services:
  - type: web
    name: devlearn
    runtime: python
    plan: free

   
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py create_superuser_if_missing && python manage.py populate_db"
    startCommand: "gunicorn settings.wsgi:application --bind 0.0.0.0:$PORT"

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devlearn-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: GEMINI_API_KEY
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
        # Задай в Dashboard → devlearn → Environment (логин/email/пароль для админки)
