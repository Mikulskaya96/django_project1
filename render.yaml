# Render Blueprint: один файл для деплоя веб-сервиса и БД.
# Документация: https://render.com/docs/blueprint-spec

databases:
  - name: devlearn-db
    databaseName: devlearn
    user: devlearn
    plan: free

services:
  - type: web
    name: devlearn
    runtime: python
    plan: free

    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"
    startCommand: "gunicorn settings.wsgi:application"

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devlearn-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: GEMINI_API_KEY
        sync: false
        # Задай вручную в Dashboard → Environment после создания сервиса
