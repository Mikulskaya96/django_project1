version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: devlearn
      POSTGRES_USER: devlearn
      POSTGRES_PASSWORD: devlearn
    volumes:
      - devlearn_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DJANGO_DEBUG: "True"
      # Django сам поймёт DATABASE_URL и переключится с sqlite на Postgres
      DATABASE_URL: "postgres://devlearn:devlearn@db:5432/devlearn"

volumes:
  devlearn_db_data: