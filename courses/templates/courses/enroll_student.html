{% extends "base.html" %}

{% block title %}Записать студента — {{ course.title }}{% endblock %}

{% block content %}
<h1>Записать студента на курс: {{ course.title }}</h1>

<form method="post">
    {% csrf_token %}
    <div class="form-row">
        {{ form.student.label_tag }}<br>
        {{ form.student }}
    </div>
    <p>
        <button type="submit" class="btn-primary">Записать</button>
        <a href="{% url 'courses:course_detail' course.pk %}" class="btn-nav">Отмена</a>
    </p>
</form>

{% endblock %}
